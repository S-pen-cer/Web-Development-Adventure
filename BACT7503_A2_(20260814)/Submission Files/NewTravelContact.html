	<main>
		<h2>Contact Us</h2>
		<hr>
		<form method="POST">
			<label for="name">Name</label>
			<input type="text" id="name"></input>
			
			<label for="email">Email</label>
			<input type="text" id="email"></input>
			
			<label for="phone">Phone Number</label>
			<input type="number" id="phone"></input>
			
			<label for="available">Time to Contact</label>
			<input type="time" id="available" class="minimum"></input>
			
			<label for="message">Message</label>
			<textarea class="form-control" id="message" rows="4"></textarea>
			
			<span><button type="submit" id="notification" class="btn btn-primary w-100">Send Message</button></span>
			<p id="response"></p>

		</form>
