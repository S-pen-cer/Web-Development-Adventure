<script>
document.getElementById("contactForm").addEventListener("submit", function(e) {
  e.preventDefault();
 
  let name = document.getElementById("name").value;
  let email = document.getElementById("email").value;
  let message = document.getElementById("message").value;
  let number = document.getElementById("phone").value;
  let hours = document.getElementById("availability").value;
  
  $("#input-field).keyup(function(e){
  var regex = /^[a-zA-Z0-9@]+$/;
  if(regex.test("name"))!== true {
	"<span class='text-danger'>Invalid character</span>";
	}
 
  if(name === "" || email === "" || message === "" || number === "" || hours === "") {
    document.getElementById("msg").innerHTML =
      "<span class='text-danger'>Please fill all fields!</span>"
	  
	  if(regex.test("name"))!== true {
		"<span class='text-danger'>Invalid character</span>";
		}
  } else {
    document.getElementById("msg").innerHTML =
      "<span class='text-success'>Message sent successfully!</span>";
 
    document.getElementById("contactForm").reset();
  }
  
  

function showAlert() {
